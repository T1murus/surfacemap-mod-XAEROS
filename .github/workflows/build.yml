name: Build SurfaceMap Mods

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-server:
    name: Build Server Mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show file structure
        run: find . -maxdepth 4 -type f | sort

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build server mod
        run: gradle build --stacktrace
        working-directory: server

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        with:
          name: surfacemap-server
          path: server/build/libs/surfacemap-server-*.jar

  build-client:
    name: Build Client Mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show file structure
        run: find . -maxdepth 4 -type f | sort

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build client mod
        run: gradle build --stacktrace
        working-directory: client

      - name: Upload client jar
        uses: actions/upload-artifact@v4
        with:
          name: surfacemap-client
          path: client/build/libs/surfacemap-client-*.jar
